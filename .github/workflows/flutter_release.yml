name: Build iOS IPA with GitHub CLI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios-ipa:
    name: Build signed iOS IPA
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.3.8"

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Install the Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate to keychain
          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # extract provisioning profile UUID and copy to provisioning profiles folder
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i $PP_PATH | plutil -extract UUID raw -)
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Build signed IPA
        run: flutter build ipa --export-options-plist=ios/ExportOptions.plist

      - name: Locate IPA path
        id: locate-ipa
        run: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" -print -quit)
          if [ -z "$IPA_PATH" ]; then
            echo "Unable to locate IPA artifact" >&2
            exit 1
          fi
          echo "ipa_path=$IPA_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload IPA as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ steps.locate-ipa.outputs.ipa_path }}
          if-no-files-found: error

      - name: Publish IPA via GitHub CLI
        id: publish-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IPA_PATH="${{ steps.locate-ipa.outputs.ipa_path }}"
          TAG="ios-ipa-${{ github.run_id }}"
          TITLE="Automated iOS IPA build ${{ github.run_id }}"
          NOTES="Automated signed iOS IPA generated from workflow run ${{ github.run_id }}."
          gh release create "$TAG" "$IPA_PATH#Signed iOS IPA" --title "$TITLE" --notes "$NOTES" --target "${{ github.sha }}" --prerelease
          DOWNLOAD_URL=$(gh release view "$TAG" --json assets --jq '.assets[0].browser_download_url')
          echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
          echo "IPA Download URL: $DOWNLOAD_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify with URL
        env:
          DOWNLOAD_URL: ${{ steps.publish-release.outputs.download_url }}
        run: |
          echo "The iOS IPA is available at: $DOWNLOAD_URL"
